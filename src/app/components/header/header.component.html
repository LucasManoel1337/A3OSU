<header class="glass-header">
  <div class="header-title">
    <h2>Visão Geral</h2>
  </div>
  
  <div class="user-profile">
    <div class="user-info">
      <span class="welcome-text">Bem-vindo(a),</span>
      <span class="nick">{{ username }}</span>
    </div>
    
    <!-- Usando uma imagem genérica de avatar do osu! -->
    <img src="https://a.ppy.sh/" alt="Avatar" class="avatar" routerLink="/perfil">
    
    <div class="divider"></div>

    <button class="btn-icon" (click)="sair()" title="Sair do sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
