<header class="glass-header">
  <div class="header-title">
    <h2>Visão Geral</h2>
  </div>

  <div class="user-profile">
    <div class="user-info">
      <span class="welcome-text">Bem-vindo(a),</span>
      <span class="nick">
        {{ username }}
        @if (isVerificado) {
          <span class="verified-badge" title="Jogador Verificado">
            <svg viewBox="0 0 24 24" aria-label="Verificado" role="img">
              <path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.998-3.918-3.998-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.337 2.25c-.416-.165-.866-.25-1.336-.25-2.21 0-3.918 1.79-3.918 4 0 .495.084.965.238 1.4-1.273.65-2.148 2.02-2.148 3.6 0 1.46.74 2.746 1.867 3.44-.106.375-.167.77-.167 1.16 0 2.21 1.71 3.998 3.918 3.998.535 0 1.043-.118 1.5-.325C9.232 21.365 10.536 22.5 12 22.5c1.464 0 2.768-1.135 3.385-2.715.457.207.965.325 1.5.325 2.21 0 3.918-1.79 3.918-4 0-.39-.06-.785-.167-1.16 1.127-.694 1.867-1.98 1.867-3.44zm-11.457 5.09l-4.5-4.5 1.414-1.414 3.086 3.086 7.086-7.086 1.414 1.414-8.5 8.5z" fill="#ff66aa"></path>
            </svg>
          </span>
        }
      </span>
    </div>

    <div class="avatar-container">
      <img
        [src]="avatarPreview || 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHfd3PPulVSp4ZbuBFNkePoUR_fLJQe474Ag&s'"
        alt="Avatar"
        class="avatar"
        (click)="toggleMenu($event)"
      >

      <div class="dropdown-menu" *ngIf="menuAberto" (click)="$event.stopPropagation()">
        <a routerLink="/perfil" (click)="menuAberto = false">
          <span class="menu-icon">👤</span> Meu Perfil
        </a>
        <a [routerLink]="['/meus-torneios', userId]" (click)="menuAberto = false">
          <span class="menu-icon">🏆</span> Meus torneios
        </a>
        <a routerLink="/config" (click)="menuAberto = false">
          <span class="menu-icon">⚙️</span> Configurações
        </a>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-icon" (click)="sair()" title="Sair do sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
