<div class="modal-overlay" *ngIf="(modalService.modalState$ | async) as state" [class.show]="state.isOpen">
  
  <div class="modal-box">
    
    <div class="icon-wrapper" [ngClass]="state.type">
      
      <svg *ngIf="state.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>

      <svg *ngIf="state.type === 'warning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>

      <svg *ngIf="state.type === 'error'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
      
    </div>
    
    <div class="text-content">
      <h3 *ngIf="state.type === 'success'">Sucesso!</h3>
      <h3 *ngIf="state.type === 'warning'">Atenção</h3>
      <h3 *ngIf="state.type === 'error'">Ops, algo deu errado!</h3>
      <p class="message">{{ state.message }}</p>
    </div>
    
    <button class="btn-confirm" [ngClass]="state.type" (click)="modalService.fechar()">
      Continuar
    </button>

  </div>
</div>
