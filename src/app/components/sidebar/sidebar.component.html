<aside class="sidebar">
  <div class="brand-container">
    <div class="osu-logo">
      <span>osu!</span>
    </div>
    <h2 class="brand-text">tournament</h2>
  </div>

  <nav class="nav-links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="icon">🏠</span> Início
    </a>

    <a routerLink="/torneios" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="icon">🏆</span> Torneios
    </a>

    <a routerLink="/criar-torneio" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="icon">📋</span> Criar Torneio
    </a>

    <a routerLink="/pegadinha" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <span class="icon">🔍</span> Pesquisar Perfil
    </a>
  </nav>

  <div class="server-status">
    <div class="status-dot"></div>
    <span class="status-text">Conectado: Nó {{ statusService.currentServer$ | async }}</span>
  </div>

  <div class="sidebar-footer">
    <p>v0.0.1 - Sist. Distribuídos</p>
  </div>
</aside>
