<main class="content-area">

  <div class="config-container">

    <!-- HEADER -->

    <div class="config-header-card">

      <div class="config-header-content">

        <div class="config-icon">
          ⚙️
        </div>

        <div>

          <h1 class="config-title">
            Configurações da Conta
          </h1>

          <p class="config-subtitle">
            Gerencie suas informações pessoais e segurança da conta.
          </p>

        </div>

      </div>

    </div>

    <section class="config-card">
      <div class="config-header-card profile-style">
        <div class="banner-preview">

          <img class="banner-image" [src]="bannerPreview" alt="Banner">

          <label class="upload-overlay">
            <input type="file" (change)="onFileSelected($event, 'banner')" hidden>
            <span>Alterar Capa</span>
          </label>

        </div>

        <div class="profile-info-wrapper">
          <div class="avatar-preview">

            <img class="avatar-image" [src]="avatarPreview" alt="Avatar">

            <label class="upload-overlay">
              <input type="file" (change)="onFileSelected($event, 'avatar')" hidden>
              <span>Trocar</span>
            </label>

          </div>

          <div class="user-details">
            <div class="title-row">
              <h1 class="config-title">{{ nickname }}</h1>
              @if (isVerified) {
              <span class="verified-badge" title="Jogador Verificado">
                <svg viewBox="0 0 24 24" aria-label="Verificado" role="img">
                  <path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.998-3.918-3.998-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.337 2.25c-.416-.165-.866-.25-1.336-.25-2.21 0-3.918 1.79-3.918 4 0 .495.084.965.238 1.4-1.273.65-2.148 2.02-2.148 3.6 0 1.46.74 2.746 1.867 3.44-.106.375-.167.77-.167 1.16 0 2.21 1.71 3.998 3.918 3.998.535 0 1.043-.118 1.5-.325C9.232 21.365 10.536 22.5 12 22.5c1.464 0 2.768-1.135 3.385-2.715.457.207.965.325 1.5.325 2.21 0 3.918-1.79 3.918-4 0-.39-.06-.785-.167-1.16 1.127-.694 1.867-1.98 1.867-3.44zm-11.457 5.09l-4.5-4.5 1.414-1.414 3.086 3.086 7.086-7.086 1.414 1.414-8.5 8.5z" fill="#ff66aa"></path>
                </svg>
              </span>
              }
              <img [src]="'https://flagcdn.com/w40/' + nacionalidade.toLowerCase() + '.png'" class="country-flag">
            </div>
            <p class="role-text">Configurações de Conta</p>
          </div>
        </div>
      </div>
    </section>

    <!-- PERFIL -->

    <section class="config-card">

      <div class="section-header">

        <h3>👤 Informações de Perfil</h3>

        <p>
          Atualize seus dados públicos e preferências da plataforma.
        </p>

      </div>

      <form class="config-form" (submit)="$event.preventDefault(); salvarPerfil()">

        <div class="form-grid">

          <app-custom-input label="Nickname" name="nickname" [(value)]="nickname" [disabled]="true">
          </app-custom-input>

          <app-custom-input label="E-mail" type="email" name="email" [(value)]="email" [disabled]="true">
          </app-custom-input>

          <app-custom-select label="Nacionalidade" name="nacionalidade" [options]="listaNacionalidades"
            [(value)]="nacionalidade">
          </app-custom-select>

          <app-custom-select label="Idioma do Sistema" name="idioma" [options]="listaIdiomas" [(value)]="idioma">
          </app-custom-select>

        </div>

        <div class="button-area">

          <button type="submit" class="btn-primary" [disabled]="carregandoPerfil">

            {{
            carregandoPerfil
            ? 'Salvando...'
            : 'Salvar Alterações'
            }}

          </button>

        </div>

      </form>

    </section>

    <!-- SENHA -->

    <section class="config-card danger-card">

      <div class="section-header">

        <h3>🔒 Segurança e Senha</h3>

        <p>
          Atualize sua senha de acesso com segurança.
        </p>

      </div>

      <form class="config-form" (submit)="$event.preventDefault(); alterarSenha()">

        <div class="password-stack">

          <app-custom-input label="Senha Atual" type="password" name="senhaAtual" placeholder="Digite sua senha atual"
            [(value)]="senhaAtual">
          </app-custom-input>

          <app-custom-input label="Nova Senha" type="password" name="novaSenha" placeholder="Digite sua nova senha"
            [(value)]="novaSenha">
          </app-custom-input>

          <app-custom-input label="Confirmar Nova Senha" type="password" name="confirmarNovaSenha"
            placeholder="Confirme sua nova senha" [(value)]="confirmarNovaSenha">
          </app-custom-input>

        </div>

        <div class="button-area">

          <button type="submit" class="btn-secondary" [disabled]="carregandoSenha">

            {{
            carregandoSenha
            ? 'Atualizando...'
            : 'Atualizar Senha'
            }}

          </button>
        </div>
      </form>
    </section>
  </div>
</main>
