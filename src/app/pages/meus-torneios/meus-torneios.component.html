<main class="content-area dark-theme-wrapper">
  
  <section class="torneio-section mb-5">
    <h2 class="section-title">Participando</h2>
    <div class="torneios-grid" *ngIf="torneiosParticipando.length > 0">
      <app-torneio-card *ngFor="let t of torneiosParticipando" [torneio]="t"></app-torneio-card>
    </div>
  </section>

  <section class="torneio-section mb-5">
    <h2 class="section-title">Meus Torneios Criados</h2>
    <div class="torneios-grid" *ngIf="torneiosCriados.length > 0">
      <app-torneio-card *ngFor="let t of torneiosCriados" [torneio]="t"></app-torneio-card>
    </div>
  </section>

  <section class="torneio-section mb-5">
    <h2 class="section-title">Moderando</h2>
    <div class="torneios-grid" *ngIf="torneiosModerando.length > 0">
      <app-torneio-card *ngFor="let t of torneiosModerando" [torneio]="t"></app-torneio-card>
    </div>
  </section>

</main>
